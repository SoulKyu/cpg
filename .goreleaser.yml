version: 2

project_name: cpg

before:
  hooks:
    - go mod tidy
    - go test -race -count=1 ./...

builds:
  - id: cpg
    main: ./cmd/cpg/
    binary: cpg
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w
      - -X main.version={{ .Version }}
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64

  - id: kubectl-cilium_policy_gen
    main: ./cmd/cpg/
    binary: kubectl-cilium_policy_gen
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w
      - -X main.version={{ .Version }}
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64

archives:
  - id: cpg
    builds:
      - cpg
    format: tar.gz
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"

  - id: krew
    builds:
      - kubectl-cilium_policy_gen
    format: tar.gz
    name_template: "cilium-policy-gen_{{ .Os }}_{{ .Arch }}"
    files:
      - LICENSE

checksum:
  name_template: "checksums.txt"

changelog:
  use: github
  sort: asc
  filters:
    exclude:
      - "^chore:"
      - "^ci:"
      - "^Merge"
  groups:
    - title: Features
      regexp: '^feat'
      order: 0
    - title: Bug fixes
      regexp: '^fix'
      order: 1
    - title: Performance
      regexp: '^perf'
      order: 2
    - title: Documentation
      regexp: '^docs'
      order: 3
    - title: Other
      order: 999

release:
  github:
    owner: SoulKyu
    name: cpg
  draft: false
  prerelease: auto
  footer: |
    ---

    ## Install

    ```bash
    # Go install
    go install github.com/SoulKyu/cpg/cmd/cpg@{{ .Tag }}

    # kubectl krew
    kubectl krew install cilium-policy-gen

    # Or download binary
    curl -sL https://github.com/SoulKyu/cpg/releases/download/{{ .Tag }}/cpg_{{ .Version }}_linux_amd64.tar.gz | tar xz
    ```

    Thanks to all contributors! {{ range .Contributors }} @{{ .Name }}{{ end }}
